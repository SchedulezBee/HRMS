services:
  postgres:
    image: postgres:16
    container_name: hrms-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrms-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hrms_portal?schema=public&sslmode=disable
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hrms_portal?schema=public&sslmode=disable
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hrms_portal_shadow?schema=public&sslmode=disable
    ports:
      - "3000:3000"

volumes:
  postgres_data:

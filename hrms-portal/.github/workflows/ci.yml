name: hrms-portal-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hrms_portal?schema=public&sslmode=disable
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hrms_portal?schema=public&sslmode=disable
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hrms_portal_shadow?schema=public&sslmode=disable
      AUTH_SECRET: ci-placeholder-secret-change-before-production
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare local databases
        run: npm run db:prepare-local

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Push schema
        run: npx prisma db push

      - name: Seed database
        run: npm run db:seed

      - name: Lint and build
        run: npm run ci:verify
